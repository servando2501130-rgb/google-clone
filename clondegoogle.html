<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 2rem;
    }

    .logo {
      font-size: 80px;
      font-weight: 400;
      letter-spacing: -2px;
      margin-bottom: 2rem;
      user-select: none;
    }
    .logo .g1 { color: #4285F4; }
    .logo .o1 { color: #EA4335; }
    .logo .o2 { color: #FBBC05; }
    .logo .g2 { color: #4285F4; }
    .logo .l  { color: #34A853; }
    .logo .e  { color: #EA4335; }

    .search-wrapper {
      width: 100%;
      max-width: 560px;
    }

    .search-box {
      display: flex;
      align-items: center;
      width: 100%;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0 14px;
      height: 46px;
      gap: 10px;
    }
    .search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32,33,36,.28);
      border-color: transparent;
    }
    .search-box svg { flex-shrink: 0; }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      color: #202124;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      font-size: 14px;
      padding: 0 20px;
      height: 36px;
      cursor: pointer;
    }
    .btn:hover {
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
      background: #f1f3f4;
      border-color: #dadce0;
    }
    .btn:active { transform: scale(0.98); }

    footer {
      background: #f2f2f2;
      border-top: 1px solid #e4e4e4;
      padding: 12px 24px;
      font-size: 14px;
      color: #70757a;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 8px;
    }
    footer a { color: #70757a; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <main>
    <div class="logo" aria-label="Google">
      <span class="g1">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
    </div>

    <div class="search-wrapper">
      <div class="search-box">
        <!-- Search icon -->
        <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
          <path fill="#9aa0a6" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>

        <input
          type="text"
          id="q"
          autocomplete="off"
          aria-label="Buscar en Google"
        />

        <!-- Mic icon -->
        <svg focusable="false" viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285f4" d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3z"/>
          <path fill="#34a853" d="M11 18.08V21h2v-2.92c2.83-.48 5-2.95 5-5.08h-2c0 1.66-1.34 3-3 3s-3-1.34-3-3H5c0 2.13 2.17 4.6 5 5.08z"/>
          <path fill="#ea4335" d="M7 13H5c0 1.99 1.19 3.7 2.93 4.58l1.41-1.41A3 3 0 0 1 7 13z" opacity=".5"/>
        </svg>
      </div>

      <div class="buttons">
        <button class="btn" id="btn-search">Buscar con Google</button>
        <button class="btn" id="btn-lucky">Me siento con suerte</button>
      </div>
    </div>
  </main>

  <footer>
    <div>
      <a href="#">Publicidad</a> &nbsp;
      <a href="#">Negocios</a> &nbsp;
      <a href="#">Cómo funciona la Búsqueda</a>
    </div>
    <div>
      <a href="#">Privacidad</a> &nbsp;
      <a href="#">Condiciones</a> &nbsp;
      <a href="#">Configuración</a>
    </div>
  </footer>

  <script>
    function doSearch() {
      const query = document.getElementById('q').value.trim();
      if (query) {
        window.location.href = 'https://google.com/search?q=' + encodeURIComponent(query);
      }
    }

    document.getElementById('q').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSearch();
    });

    document.getElementById('btn-search').addEventListener('click', doSearch);
    document.getElementById('btn-lucky').addEventListener('click', doSearch);
  </script>

</body>
</html>
